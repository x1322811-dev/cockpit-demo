<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .line { stroke: #000000; stroke-width: 2; fill: none; }
      .thin { stroke: rgba(0,0,0,0.14); stroke-width: 1; fill: none; }
      .hair { stroke: rgba(0,0,0,0.08); stroke-width: 1; fill: none; }
      .surface { fill: #f2f2f2; }
      .text { fill: #000000; font-family: Inter, Helvetica, Arial, sans-serif; }
      .muted { fill: #999999; font-family: Inter, Helvetica, Arial, sans-serif; }
      .subtle { fill: #666666; font-family: Inter, Helvetica, Arial, sans-serif; }
      .accent { fill: #ff3000; }
      .accent-stroke { stroke: #ff3000; }
      .glass { fill: rgba(197,228,255,0.52); stroke: rgba(0,0,0,0.12); }
      .seat { fill: #f8f6f2; stroke: #000000; stroke-width: 1.4; }
      .seat-dark { fill: #222222; }
      .glow-cyan { stroke: #00ced1; stroke-width: 8; stroke-linecap: round; opacity: 0.45; filter: url(#softGlow); }
      .air { stroke: #ff3000; stroke-width: 2; stroke-linecap: round; fill: none; stroke-dasharray: 8 8; opacity: 0.8; }
      .shadow { filter: url(#cardShadow); }
      .smallcaps { font-size: 13px; font-weight: 700; letter-spacing: 2px; }
    </style>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" class="hair"/>
    </pattern>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect x="0" y="0" width="1600" height="1000" fill="url(#grid)" opacity="0.55"/>

  <!-- 顶部品牌栏 -->
  <rect x="0" y="0" width="1600" height="58" fill="#ffffff"/>
  <line x1="0" y1="58" x2="1600" y2="58" class="line"/>
  <rect x="26" y="20" width="20" height="20" class="accent"/>
  <text x="62" y="27" class="text" font-size="18" font-weight="800">智能座舱 Agent · 实时响应推理 Demo</text>
  <text x="62" y="45" class="muted smallcaps">COCKPIT STATE → INTENT → PLAN → REASON → DECIDE → EXECUTE</text>

  <!-- 主布局分栏 -->
  <line x1="880" y1="58" x2="880" y2="1000" class="line"/>
  <line x1="880" y1="540" x2="1600" y2="540" class="line"/>
  <line x1="0" y1="650" x2="880" y2="650" class="line"/>

  <!-- 左上：座舱模拟区 -->
  <rect x="0" y="58" width="880" height="592" fill="#ffffff"/>
  <rect x="0" y="58" width="880" height="38" fill="#ffffff"/>
  <line x1="0" y1="96" x2="880" y2="96" class="line"/>
  <text x="22" y="83" class="text" font-size="16" font-weight="800">座舱模拟区</text>
  <text x="116" y="83" class="muted smallcaps">COCKPIT TWIN</text>

  <!-- 速度 chips -->
  <g transform="translate(555,68)">
    <rect x="0" y="0" width="70" height="18" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
    <text x="10" y="13" class="subtle" font-size="12" font-weight="700">驻车</text>
    <text x="42" y="13" class="muted" font-size="10">0</text>
    <rect x="78" y="0" width="78" height="18" fill="#000000"/>
    <text x="88" y="13" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="12" font-weight="700">慢速</text>
    <text x="121" y="13" fill="#ffffff" opacity="0.65" font-family="Inter, Helvetica, Arial" font-size="10">20</text>
    <rect x="164" y="0" width="78" height="18" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
    <text x="174" y="13" class="subtle" font-size="12" font-weight="700">中速</text>
    <text x="207" y="13" class="muted" font-size="10">50</text>
    <rect x="250" y="0" width="78" height="18" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
    <text x="260" y="13" class="subtle" font-size="12" font-weight="700">高速</text>
    <text x="293" y="13" class="muted" font-size="10">80</text>
  </g>

  <!-- 新座舱数字孪生区域 -->
  <g transform="translate(22,112)" class="shadow">
    <rect x="0" y="0" width="836" height="190" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
    <rect x="0" y="0" width="836" height="28" class="surface"/>
    <text x="14" y="19" class="text" font-size="13" font-weight="800">座舱数字孪生</text>
    <text x="132" y="19" class="muted smallcaps">LIVE CABIN MAP</text>
    <text x="708" y="19" class="muted smallcaps">NO IMAGE API</text>

    <!-- 车舱外轮廓 -->
    <g transform="translate(88,40)">
      <path d="M80 8 C45 20 22 55 18 95 C20 132 48 146 94 150 L566 150 C612 146 640 132 642 95 C638 55 615 20 580 8 Z" fill="#fbfbfb" stroke="#000000" stroke-width="2"/>
      <path d="M138 18 C118 30 104 56 102 88 L102 128 L558 128 L558 88 C556 56 542 30 522 18 Z" class="glass"/>
      <path d="M247 28 L413 28 L448 128 L212 128 Z" fill="rgba(197,228,255,0.24)" stroke="rgba(0,0,0,0.12)"/>
      <line x1="330" y1="25" x2="330" y2="132" class="thin"/>

      <!-- 氛围灯光带 -->
      <path d="M92 116 C170 142 490 142 568 116" class="glow-cyan"/>
      <path d="M92 116 C170 142 490 142 568 116" stroke="#00ced1" stroke-width="2" stroke-linecap="round" opacity="0.9"/>

      <!-- 中控 -->
      <rect x="302" y="58" width="56" height="82" rx="8" fill="#111111"/>
      <rect x="311" y="66" width="38" height="22" fill="#ff3000" opacity="0.9"/>
      <line x1="312" y1="99" x2="348" y2="99" stroke="#ffffff" opacity="0.35"/>
      <line x1="312" y1="111" x2="348" y2="111" stroke="#ffffff" opacity="0.35"/>

      <!-- 方向盘 -->
      <circle cx="204" cy="78" r="23" fill="none" stroke="#000000" stroke-width="4"/>
      <circle cx="204" cy="78" r="5" fill="#000000"/>
      <line x1="204" y1="78" x2="186" y2="86" class="thin"/>
      <line x1="204" y1="78" x2="222" y2="86" class="thin"/>

      <!-- 座椅 -->
      <g transform="translate(160,72)">
        <rect x="0" y="0" width="88" height="58" rx="18" class="seat"/>
        <rect x="13" y="8" width="62" height="18" rx="9" fill="#ebe7df"/>
        <rect x="17" y="34" width="54" height="16" rx="8" fill="#ebe7df"/>
        <path d="M16 62 C33 73 58 73 74 62" fill="none" stroke="#ff3000" stroke-width="3" stroke-linecap="round"/>
        <circle cx="82" cy="10" r="5" class="accent"/>
      </g>
      <g transform="translate(414,72)">
        <rect x="0" y="0" width="88" height="58" rx="18" class="seat"/>
        <rect x="13" y="8" width="62" height="18" rx="9" fill="#ebe7df"/>
        <rect x="17" y="34" width="54" height="16" rx="8" fill="#ebe7df"/>
        <circle cx="82" cy="10" r="5" fill="#00ced1"/>
        <circle cx="70" cy="10" r="5" fill="#ff8c00"/>
      </g>

      <!-- 空调气流 -->
      <path d="M282 72 C252 58 238 56 218 62" class="air"/>
      <path d="M378 72 C408 58 422 56 442 62" class="air"/>
      <path d="M282 102 C252 118 236 120 214 114" class="air" opacity="0.45"/>
      <path d="M378 102 C408 118 424 120 446 114" class="air" opacity="0.45"/>

      <!-- 车窗开度 -->
      <rect x="44" y="66" width="36" height="74" fill="rgba(197,228,255,0.68)" stroke="rgba(0,0,0,0.10)"/>
      <rect x="44" y="66" width="36" height="28" fill="#ffffff" opacity="0.72"/>
      <rect x="580" y="66" width="36" height="74" fill="rgba(197,228,255,0.68)" stroke="rgba(0,0,0,0.10)"/>
      <rect x="580" y="66" width="36" height="54" fill="#ffffff" opacity="0.72"/>

      <text x="160" y="165" class="muted smallcaps">DRIVER</text>
      <text x="420" y="165" class="muted smallcaps">PASSENGER</text>
    </g>

    <!-- 右侧关键状态 -->
    <g transform="translate(720,48)">
      <text x="0" y="0" class="muted smallcaps">LIVE STATE</text>
      <text x="0" y="32" class="text" font-size="28" font-weight="900">22.5°C</text>
      <text x="0" y="52" class="muted" font-size="12">主驾温度 · 风量 3</text>
      <rect x="0" y="70" width="74" height="20" fill="#ff3000"/>
      <text x="10" y="84" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="11" font-weight="800">零重力 ON</text>
      <text x="0" y="116" class="subtle" font-size="12">氛围灯：冰晶青</text>
    </g>
  </g>

  <!-- 主驾/副驾卡片 -->
  <g transform="translate(22,318)">
    <text x="0" y="0" class="text" font-size="15" font-weight="800">主驾区</text>
    <text x="58" y="0" class="muted smallcaps">DRIVER</text>
    <rect x="0" y="16" width="405" height="166" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
    <rect x="0" y="16" width="405" height="28" class="surface"/>
    <text x="14" y="35" class="text" font-size="13" font-weight="800">空调</text>
    <rect x="346" y="22" width="44" height="16" fill="#000000"/>
    <text x="358" y="34" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="10" font-weight="700">ON</text>
    <text x="28" y="82" class="muted smallcaps">风量</text>
    <rect x="28" y="96" width="12" height="12" fill="#000"/>
    <rect x="46" y="96" width="12" height="12" fill="#000"/>
    <rect x="64" y="96" width="12" height="12" fill="#000"/>
    <rect x="82" y="96" width="12" height="12" fill="#fff" stroke="rgba(0,0,0,0.18)"/>
    <rect x="100" y="96" width="12" height="12" fill="#fff" stroke="rgba(0,0,0,0.18)"/>
    <text x="160" y="104" class="text" font-size="38" font-weight="900">22.5</text>
    <text x="252" y="103" class="subtle" font-size="16">°C</text>
    <text x="312" y="82" class="muted smallcaps">风向</text>
    <rect x="308" y="92" width="28" height="28" fill="#000"/>
    <rect x="344" y="92" width="28" height="28" fill="#fff" stroke="#000"/>
    <rect x="308" y="138" width="76" height="22" fill="#ff3000"/>
    <text x="319" y="153" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="11" font-weight="800">零重力</text>
  </g>

  <g transform="translate(453,318)">
    <text x="0" y="0" class="text" font-size="15" font-weight="800">副驾区</text>
    <text x="58" y="0" class="muted smallcaps">PASSENGER</text>
    <rect x="0" y="16" width="405" height="166" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
    <rect x="0" y="16" width="405" height="28" class="surface"/>
    <text x="14" y="35" class="text" font-size="13" font-weight="800">空调</text>
    <rect x="346" y="22" width="44" height="16" fill="#000000"/>
    <text x="358" y="34" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="10" font-weight="700">ON</text>
    <text x="28" y="82" class="muted smallcaps">风量</text>
    <rect x="28" y="96" width="12" height="12" fill="#000"/>
    <rect x="46" y="96" width="12" height="12" fill="#000"/>
    <rect x="64" y="96" width="12" height="12" fill="#fff" stroke="rgba(0,0,0,0.18)"/>
    <rect x="82" y="96" width="12" height="12" fill="#fff" stroke="rgba(0,0,0,0.18)"/>
    <rect x="100" y="96" width="12" height="12" fill="#fff" stroke="rgba(0,0,0,0.18)"/>
    <text x="160" y="104" class="text" font-size="38" font-weight="900">22.0</text>
    <text x="252" y="103" class="subtle" font-size="16">°C</text>
    <text x="312" y="82" class="muted smallcaps">风向</text>
    <rect x="308" y="92" width="28" height="28" fill="#fff" stroke="#000"/>
    <rect x="344" y="92" width="28" height="28" fill="#000"/>
    <rect x="308" y="138" width="76" height="22" fill="#fff" stroke="#000"/>
    <text x="325" y="153" class="text" font-size="11" font-weight="800">通风</text>
  </g>

  <!-- 公域 -->
  <g transform="translate(22,526)">
    <text x="0" y="0" class="text" font-size="15" font-weight="800">公域</text>
    <text x="42" y="0" class="muted smallcaps">SHARED SPACE</text>
    <rect x="0" y="16" width="836" height="94" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
    <line x1="190" y1="16" x2="190" y2="110" class="thin"/>
    <line x1="370" y1="16" x2="370" y2="110" class="thin"/>
    <line x1="512" y1="16" x2="512" y2="110" class="thin"/>
    <text x="14" y="42" class="text" font-size="13" font-weight="800">音乐</text>
    <text x="14" y="68" class="text" font-size="18" font-weight="900">Take Five</text>
    <rect x="14" y="82" width="18" height="18" fill="#ff3000"/>
    <rect x="38" y="76" width="18" height="24" fill="#000"/>
    <rect x="62" y="86" width="18" height="14" fill="#000"/>
    <text x="210" y="42" class="text" font-size="13" font-weight="800">氛围灯</text>
    <rect x="210" y="62" width="20" height="36" fill="#00ced1"/>
    <rect x="238" y="62" width="20" height="36" fill="#4a90d9" opacity="0.35"/>
    <rect x="266" y="62" width="20" height="36" fill="#9370db" opacity="0.25"/>
    <text x="390" y="42" class="text" font-size="13" font-weight="800">天窗</text>
    <rect x="390" y="60" width="94" height="28" class="glass"/>
    <text x="534" y="42" class="text" font-size="13" font-weight="800">导航</text>
    <text x="534" y="70" class="text" font-size="24" font-weight="900">28.4</text>
    <text x="596" y="70" class="subtle" font-size="12">km</text>
    <text x="650" y="70" class="accent" font-size="24" font-weight="900">41</text>
    <text x="688" y="70" class="subtle" font-size="12">min</text>
    <path d="M742 88 L772 64 L802 74 L826 48" fill="none" stroke="#ff3000" stroke-width="3"/>
  </g>

  <!-- 左下 StateDiff -->
  <g transform="translate(0,650)">
    <rect x="0" y="0" width="880" height="350" fill="#ffffff"/>
    <rect x="0" y="0" width="880" height="38" fill="#ffffff"/>
    <line x1="0" y1="38" x2="880" y2="38" class="line"/>
    <text x="22" y="25" class="text" font-size="16" font-weight="800">状态变化</text>
    <text x="104" y="25" class="muted smallcaps">STATE DIFF</text>
    <g transform="translate(22,62)">
      <rect x="0" y="0" width="250" height="86" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
      <rect x="0" y="0" width="250" height="24" class="surface"/>
      <text x="12" y="17" class="text" font-size="12" font-weight="800">climate.tempFront</text>
      <text x="18" y="60" class="muted" font-size="24" font-weight="900">22.0</text>
      <text x="96" y="60" class="accent" font-size="24" font-weight="900">22.5</text>
      <line x1="75" y1="53" x2="88" y2="53" stroke="#000"/>
    </g>
    <g transform="translate(292,62)">
      <rect x="0" y="0" width="250" height="86" fill="#ffffff" stroke="rgba(0,0,0,0.14)"/>
      <rect x="0" y="0" width="250" height="24" class="surface"/>
      <text x="12" y="17" class="text" font-size="12" font-weight="800">ambientLight.color</text>
      <rect x="18" y="44" width="36" height="20" fill="#4a90d9"/>
      <rect x="92" y="44" width="36" height="20" fill="#00ced1"/>
      <line x1="66" y1="54" x2="82" y2="54" stroke="#000"/>
    </g>
  </g>

  <!-- 右上推理区 -->
  <g transform="translate(880,58)">
    <rect x="0" y="0" width="720" height="482" fill="#ffffff"/>
    <rect x="0" y="0" width="720" height="38" fill="#ffffff"/>
    <line x1="0" y1="38" x2="720" y2="38" class="line"/>
    <text x="22" y="25" class="text" font-size="16" font-weight="800">Agent 推理过程</text>
    <text x="148" y="25" class="muted smallcaps">REASONING STREAM</text>
    <g transform="translate(22,64)">
      <circle cx="16" cy="16" r="15" fill="#f2f2f2" stroke="rgba(0,0,0,0.14)"/>
      <text x="11" y="21" class="text" font-size="13" font-weight="900">1</text>
      <text x="48" y="14" class="muted smallcaps">INTENT</text>
      <text x="48" y="38" class="text" font-size="16" font-weight="800">用户想营造休息氛围，并调整主驾舒适状态</text>
      <line x1="16" y1="40" x2="16" y2="96" class="thin"/>
    </g>
    <g transform="translate(22,150)">
      <circle cx="16" cy="16" r="15" fill="#f2f2f2" stroke="rgba(0,0,0,0.14)"/>
      <text x="11" y="21" class="text" font-size="13" font-weight="900">2</text>
      <text x="48" y="14" class="muted smallcaps">PLAN</text>
      <text x="48" y="38" class="text" font-size="16" font-weight="800">调温、打开氛围灯、切换座椅零重力</text>
      <line x1="16" y1="40" x2="16" y2="96" class="thin"/>
    </g>
    <g transform="translate(22,236)">
      <circle cx="16" cy="16" r="15" fill="#ff3000"/>
      <text x="11" y="21" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="13" font-weight="900">3</text>
      <text x="48" y="14" class="muted smallcaps">EXECUTE</text>
      <rect x="48" y="26" width="180" height="28" fill="#000"/>
      <text x="62" y="45" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="13" font-weight="800">set_zero_gravity</text>
      <rect x="242" y="26" width="156" height="28" fill="#ff3000"/>
      <text x="256" y="45" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="13" font-weight="800">vehicle_patch</text>
    </g>
  </g>

  <!-- 右下聊天区 -->
  <g transform="translate(880,540)">
    <rect x="0" y="0" width="720" height="460" fill="#ffffff"/>
    <rect x="0" y="0" width="720" height="38" fill="#ffffff"/>
    <line x1="0" y1="38" x2="720" y2="38" class="line"/>
    <text x="22" y="25" class="text" font-size="16" font-weight="800">对话</text>
    <text x="70" y="25" class="muted smallcaps">DUAL-ZONE INPUT</text>
    <g transform="translate(40,70)">
      <rect x="0" y="0" width="360" height="54" fill="#f2f2f2"/>
      <text x="18" y="32" class="text" font-size="16" font-weight="700">帮我营造休息的氛围</text>
    </g>
    <g transform="translate(210,150)">
      <rect x="0" y="0" width="440" height="62" fill="#000000"/>
      <text x="18" y="36" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="16" font-weight="700">温度调到22.5度，座椅已进入零重力</text>
    </g>
    <g transform="translate(40,362)">
      <rect x="0" y="0" width="640" height="58" fill="#ffffff" stroke="#000000"/>
      <text x="18" y="36" class="muted" font-size="16">输入自然语言控制车内环境...</text>
      <rect x="548" y="10" width="78" height="38" fill="#ff3000"/>
      <text x="572" y="34" fill="#ffffff" font-family="Inter, Helvetica, Arial" font-size="14" font-weight="900">发送</text>
    </g>
  </g>
</svg>
